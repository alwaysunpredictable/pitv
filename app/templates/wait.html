<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Please wait</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
      --bg: #0B0B10; --card: #16161E; --border: #24243A;
      --accent: #C9973A; --fg: #F0F2FF; --muted: #6A6A8A;
    }
    html, body {
      min-height: 100dvh; background: var(--bg); color: var(--fg);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: grid; place-items: center; padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { width: 100%; max-width: 400px; text-align: center }
    .icon { font-size: 48px; margin-bottom: 20px }
    .eyebrow {
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent); font-weight: 700; margin-bottom: 12px;
    }
    h1 { font-size: 26px; font-weight: 800; margin-bottom: 10px }
    .sub { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 28px }
    .dots { display: flex; gap: 10px; justify-content: center }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); opacity: 0.3;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s }
    .dot:nth-child(3) { animation-delay: 0.4s }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(1) }
      40%           { opacity: 1;   transform: scale(1.3) }
    }
  </style>
</head>
<body>
<div class="wrap">
  {% if mode == "picking" %}
    <div class="icon">🎬</div>
    <div class="eyebrow">One moment</div>
    <h1>Someone is choosing</h1>
    <p class="sub">Another guest is picking a video. You'll be able to choose once they're done.</p>
  {% else %}
    <div class="icon">🍿</div>
    <div class="eyebrow">Now Playing</div>
    <h1>{% if title %}{{ title }}{% else %}Video in progress{% endif %}</h1>
    <p class="sub">Sit back and enjoy — the video plays to the end.</p>
  {% endif %}
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
<script>
// Auto-check if we can enter now
async function check() {
  try {
    const r  = await fetch('/api/state');
    const st = await r.json();
    if (st.mode === 'idle') location.href = '/';
  } catch {}
  setTimeout(check, 5000);
}
setTimeout(check, 5000);
</script>
</body>
</html>
