<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Now Playing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
      --bg: #0B0B10; --card: #16161E; --border: #24243A;
      --accent: #C9973A; --fg: #F0F2FF; --muted: #6A6A8A;
      --danger: #E05252;
    }
    html, body {
      min-height: 100dvh; background: var(--bg); color: var(--fg);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: grid; place-items: center; padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { width: 100%; max-width: 480px }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .poster-wrap {
      position: relative; width: 100%; aspect-ratio: 2/3;
      max-height: 340px; overflow: hidden;
    }
    .poster-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .poster-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(11,11,16,0.95) 0%, transparent 60%);
    }
    .poster-title {
      position: absolute; bottom: 16px; left: 16px; right: 16px;
      font-size: 22px; font-weight: 800; line-height: 1.2;
    }
    .body { padding: 20px }
    .eyebrow {
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent); font-weight: 700; margin-bottom: 16px;
    }
    .msg { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 22px }
    .btn-stop {
      width: 100%; padding: 15px; border: none; border-radius: 14px;
      background: var(--danger); color: #fff;
      font-size: 16px; font-weight: 800; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-stop:disabled { opacity: 0.5; cursor: not-allowed }
    .btn-stop:active:not(:disabled) { opacity: 0.8 }
    .status-msg {
      margin-top: 12px; font-size: 13px; color: var(--muted);
      text-align: center; min-height: 20px;
    }
    .no-poster .body { padding-top: 28px }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card {% if not poster_rel %}no-poster{% endif %}">
    {% if poster_rel %}
    <div class="poster-wrap">
      <img src="{{ url_for('poster', rel=poster_rel) }}" alt="{{ title }}">
      <div class="poster-gradient"></div>
      <div class="poster-title">{{ title }}</div>
    </div>
    {% endif %}
    <div class="body">
      <div class="eyebrow">You're in control</div>
      {% if not poster_rel %}<div style="font-size:20px;font-weight:800;margin-bottom:8px">{{ title }}</div>{% endif %}
      <p class="msg">Sit back and enjoy. You can stop the video at any time — no one else can.</p>
      <button class="btn-stop" id="stop-btn" onclick="stopVideo()">Stop Video</button>
      <div class="status-msg" id="status"></div>
    </div>
  </div>
</div>
<script>
let stopping = false;

async function stopVideo() {
  if (stopping) return;
  stopping = true;
  const btn = document.getElementById('stop-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Stopping…';
  try {
    await fetch('/api/stop', { method: 'POST' });
    status.textContent = 'Stopping — waiting for the video to end…';
    pollForIdle();
  } catch {
    status.textContent = 'Network error. Reload and try again.';
    stopping = false;
    btn.disabled = false;
    btn.textContent = 'Stop Video';
  }
}

// Passive background check — catches admin reset or natural video end
setInterval(async () => {
  if (stopping) return;
  try {
    const r  = await fetch("/api/state");
    const st = await r.json();
    if (st.mode !== "playing") location.href = "/";
  } catch {}
}, 3000);

async function pollForIdle() {
  try {
    const r  = await fetch('/api/state');
    const st = await r.json();
    if (st.mode === 'idle') {
      location.href = '/';
      return;
    }
  } catch {}
  setTimeout(pollForIdle, 1000);
}
</script>
</body>
</html>
